name: 🐛 Bug Report
about: Report a problem or unexpected behaviour
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug!
        Please fill in the information below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clear and concise description of the problem
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behaviour?
      placeholder: |
        1. Open a .usd file in Explorer
        2. Right-click and select '...'
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen instead?
      placeholder: Describe the expected behaviour...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the extension is impacted?
      options:
        - UsdShellExtension — Core DLL (thumbnails, preview, property store)
        - UsdPreviewLocalServer — 3D preview pane
        - UsdPythonToolsLocalServer — usdview / usdrecord
        - UsdSdkToolsLocalServer — Format conversion (crate/flatten/package)
        - UsdShellExtensionInstaller — NSIS installer
        - install.ps1 / build.ps1 — Build and install scripts
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: Windows version
      placeholder: "e.g. Windows 11 Pro 23H2"

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs from Windows Event Viewer (Application log, source "USD Shell Extension")
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked that this issue does not already exist
          required: true
        - label: I have read the documentation (docs/DEBUG.md)
          required: false
