name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Lint Python (Ruff)
        run: |
          pip install ruff
          ruff check UsdPreviewHandlerServer/ UsdPythonToolsServer/

      - name: Lint PowerShell (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $settings = Join-Path $env:GITHUB_WORKSPACE "PSScriptAnalyzerSettings.psd1"
          $files = Get-ChildItem -Path . -Filter "*.ps1" -Recurse
          $results = $files | ForEach-Object { Invoke-ScriptAnalyzer -Path $_.FullName -Settings $settings -Severity Warning,Error }
          if ($results) { $results; exit 1 }
