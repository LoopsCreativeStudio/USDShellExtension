name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Python (Ruff)
        run: |
          pip install ruff
          ruff check UsdPreviewHandlerServer/ UsdPythonToolsServer/

      - name: Lint PowerShell (PSScriptAnalyzer)
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path . -Include "*.ps1" -Severity Warning,Error -ReportSummary
          if ($results) { $results; exit 1 }
